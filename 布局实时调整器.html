ind: \"起点\", text: \"想在家跟着视频练一练，久坐的身体需要舒展。\" }\n    ],\n    meta: [[\"关注价格\", \"¥199\"], [\"记录日期\", \"2025 年 9 月 2 日\"]]\n  }\n};\n\nconst monthOrder = [\"七月\", \"六月\", \"更早\"];\nconst catOrder = [\"数码\", \"家居\", \"运动\"];\nconst statusNames = { companion: \"陪伴中\", deciding: \"犹豫中\", passed: \"没有买\", shelved: \"搁置\" };\n\nfunction renderTimeline() {\n  const el = document.getElementById(\"timeline-list\");\n  let html = \"\";\n  monthOrder.forEach(m => {\n    const group = Object.entries(items).filter(([k, v]) => v.month === m && v.status !== \"shelved\");\n    if (!group.length) return;\n    html += `<p class=\"month\">${m}</p>`;\n    group.forEach(([k, v]) => {\n      const imgs = v.entries.filter(e => e.img);\n      const thumb = imgs.length ? `<img class=\"card-thumb\" src=\"${imgs[imgs.length - 1].img}\">` : \"\";\n      html += `<div class=\"card\" onclick=\"openDetail('${k}')\">\n        <div class=\"card-row\"><p class=\"name\">${v.name}</p>${thumb}</div>\n        ${v.quote ? `<p class=\"quote\">${v.quote.replace(/^「|」$/g, \"\")}</p>` : \"\"}\n        <p class=\"state\">${v.state}</p>\n      </div>`;\n    });\n  });\n  el.innerHTML = html;\n  renderStats();\n}\n\nlet currentFilter = \"all\";\nfunction renderIndex() {\n  const el = document.getElementById(\"index-list\");\n  const sub = document.getElementById(\"index-sub\");\n  const keys = Object.keys(items).filter(k => currentFilter === \"all\" || items[k].status === currentFilter);\n  if (currentFilter === \"all\") sub.textContent = `你认真想过 ${keys.length} 件东西`;\n  else if (currentFilter === \"companion\") sub.textContent = `${keys.length} 件东西正陪伴着你`;\n  else if (currentFilter === \"deciding\") sub.textContent = `你正在考虑 ${keys.length} 件东西`;\n  else if (currentFilter === \"idle\") sub.textContent = `${keys.length} 件东西正在闲置`;\n  else if (currentFilter === \"ended\") sub.textContent = `你与 ${keys.length} 件东西告别了`;\n  else sub.textContent = `你想清楚后放下了 ${keys.length} 件东西`;\n  let html = \"\";\n  catOrder.forEach(c => {\n    const group = keys.filter(k => items[k].cat === c);\n    if (!group.length) return;\n    html += `<p class=\"cat\">${c} · ${group.length}</p>`;\n    group.forEach(k => {\n      const v = items[k];\n      const right = currentFilter === \"all\" ? v.state : v.time;\n      html += `<div class=\"row\" onclick=\"openDetail('${k}')\">\n        <div class=\"row-top\"><span class=\"name\">${v.name}</span><span class=\"time\">${right}</span></div>\n        <p class=\"sub\">${v.sub}</p>\n      </div>`;\n    });\n  });\n  el.innerHTML = html || `<p class=\"empty-note\">这一页还是空白。</p>`;\n}\n\nlet lastScreen = \"timeline\";\nlet currentKey = null;\nfunction openDetail(key) {\n  currentKey = key;\n  const v = items[key];\n  document.getElementById(\"d-name\").textContent = v.name;\n  document.getElementById(\"d-state\").textContent = v.state;\n  renderEntries(v);\n  document.getElementById(\"d-meta-rows\").innerHTML = v.meta.map(m =>\n    `<div class=\"mrow\"><span>${m[0]}</span><span>${m[1]}</span></div>`\n  ).join(\"\");\n  document.getElementById(\"d-meta\").removeAttribute(\"open\");\n  renderActions(v);\n  hideCompose();\n  delMode = false;\n  document.getElementById(\"d-del-hint\").style.display = \"none\";\n  lastScreen = document.querySelector(\".screen.active\").id.replace(\"screen-\", \"\");\n  if (lastScreen === \"detail\" || lastScreen === \"create\") lastScreen = \"timeline\";\n  showScreen(\"detail\");\n  document.getElementById(\"tabbar\").style.display = \"none\";\n  window.scrollTo(0, 0);\n}\nfunction closeDetail() {\n  showScreen(lastScreen);\n  document.getElementById(\"tabbar\").style.display = \"\";\n}\nfunction showScreen(name) {\n  document.querySelectorAll(\".screen\").forEach(s => s.classList.remove(\"active\"));\n  document.getElementById(\"screen-\" + name).classList.add(\"active\");\n}\n\ndocument.querySelectorAll(\".tab\").forEach(t => t.addEventListener(\"click\", () => {\n  document.querySelectorAll(\".tab\").forEach(x => x.classList.remove(\"on L.createObjectURL(file);\n}\nfunction pickPhoto(w) {\n  const inp = document.getElementById(w + \"-photo\");\n  const nameEl = document.getElementById(w + \"-photo-name\");\n  const prev = document.getElementById(w + \"-photo-preview\");\n  if (!inp.files[0]) {\n    picked[w] = null;\n    nameEl.textContent = \"\";\n    prev.style.display = \"none\";\n    return;\n  }\n  fileToData(inp.files[0], 900, data => {\n    picked[w] = data;\n    nameEl.textContent = \"· 已选好\";\n    nameEl.className = \"picked\";\n    prev.src = data;\n    prev.style.display = \"block\";\n  });\n}\nfunction resetPhoto(w) {\n  picked[w] = null;\n  document.getElementById(w + \"-photo\").value = \"\";\n  document.getElementById(w + \"-photo-name\").textContent = \"\";\n  document.getElementById(w + \"-photo-preview\").style.display = \"none\";\n}\n\nfunction openCreate() {\n  [\"c-name\", \"c-why\", \"c-price\", \"c-cat\"].forEach(id => document.getElementById(id).value = \"\");\n  calReset();\n  resetPhoto(\"c\");\n  document.getElementById(\"c-cal-slot\").appendChild(document.getElementById(\"c-cal-wrap\"));\n  document.getElementById(\"c-cal-wrap\").style.display = \"\";\n  calSelected = null;\n  renderCal();\n  document.getElementById(\"cstep1\").style.display = \"\";\n  document.getElementById(\"cstep2\").style.display = \"none\";\n  lastScreen = document.querySelector(\".screen.active\").id.replace(\"screen-\", \"\");\n  if (lastScreen === \"detail\" || lastScreen === \"create\") lastScreen = \"timeline\";\n  showScreen(\"create\");\n  document.getElementById(\"tabbar\").style.display = \"none\";\n  window.scrollTo(0, 0);\n}\nfunction cancelCreate() {\n  showScreen(lastScreen);\n  document.getElementById(\"tabbar\").style.display = \"\";\n}\nfunction createNext() {\n  if (!document.getElementById(\"c-name\").value.trim()) return;\n  document.getElementById(\"cstep1\").style.display = \"none\";\n  document.getElementById(\"cstep2\").style.display = \"\";\n}\nfunction dateToCn(dateStr) {\n  const dt = new Date(dateStr + \"T00:00:00\");\n  return cn[dt.getMonth()] + \"月\" + cnDay(dt.getDate()) + \"日\";\n}\nfunction daysDiff(dateStr) {\n  const dt = new Date(dateStr + \"T00:00:00\");\n  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());\n  return Math.max(1, Math.round((today - dt) / 86400000) + 1);\n}\nfunction saveCreate() {\n  const name = document.getElementById(\"c-name\").value.trim();\n  const why = document.getElementById(\"c-why\").value.trim() || \"还没想好怎么说。\";\n  const price = document.getElementById(\"c-price\").value.trim();\n  const cat = document.getElementById(\"c-cat\").value.trim() || \"未分类\";\n  const dateVal = calSelected;\n  const dateCn = dateVal ? dateToCn(dateVal) : todayCn;\n  const days = dateVal ? daysDiff(dateVal) : 1;\n  if (!catOrder.includes(cat)) catOrder.push(cat);\n  const meta = [[\"记录日期\", dateCn]];\n  if (price) meta.unshift([\"关注价格\", price]);\n  const key = \"u\" + Date.now();\n  items[key] = {\n    name, cat, status: \"deciding\",\n    state: \"犹豫中 · 第 \" + days + \" 天\", time: \"第 \" + days + \" 天\", month: monthOrder[0],\n    quote: \"「\" + why.split(/[。？！\\n]/)[0] + \"。」\",\n    sub: \"记于 · \" + dateCn,\n    entries: [{ date: dateCn, kind: \"起点\", text: why, img: picked.c || undefined }],\n    meta\n  };\n  renderTimeline(); renderIndex();\n  persist();\n  cancelCreate();\n  if (!firstRecordDone) {\n    firstRecordDone = true;\n    persist();\n    showRitual(\"这是你的第一条决策记录。慢慢来。\", \"第一条记录\", name);\n  }\n}\n\nconst profile = { name: \"\", avatar: null };\n\nfunction applyProfile() {\n  document.getElementById(\"me-name\").value = profile.name;\n  if (profile.avatar) {\n    const img = document.getElementById(\"me-avatar\");\n    img.src = profile.avatar;\n    img.style.display = \"block\";\n    document.getElementById(\"me-avatar-ph\").style.display = \"none\";\n    [\"home-avatar\", \"index-avatar\"].forEach(id => {\n      const el = document.getElementById(id);\n      if (el) { el.src = profile.avatar; el.style.display = \"block\"; }\n    });\n    [\"home-avatar-ph\", \"index-avatar-ph\"].forEach(id => {\n      const el = document.getElementById(id);\n      if (el) el.style.display = \"none\";\n    });\n  }\n  if (profile.name) {\n    [\"home-avatar-ph\", \"index-avatar-ph\"].forEach(id => {\n      const el = document.getElementById(id);\n      if (el) el.textContent = profile.name.slice(0, 1);\n    });\n  }\n}\nfunction setAvatar() {\n  const inp = document.getElementById(\"me-photo\");\n  if (!inp.files[0]) return;\n  fileToData(inp.files[0], 256, data => {\n    profile.avatar = data;\n    applyProfile();\n    persist();\n  });\n}\nfunction saveName() {\n  profile.name = document.getElementById(\"me-name\").value.trim();\n  applyProfile();\n  persist();\n}\n\nfunction persist() {\n  try {\n    localStorage.setItem(\"dj-v1\", JSON.stringify({ items, catOrder, firstRecordDone, profile }));\n  } catch (e) {\n    console.warn(\"存储失败，可能空间不足\", e);\n  }\n}\nfunction restore() {\n  let saved = null;\n  try { saved = JSON.parse(localStorage.getItem(\"dj-v1\") || \"null\"); } catch (e) {}\n  if (!saved) return;\n  Object.keys(items).forEach(k => delete items[k]);\n  Object.assign(items, saved.items);\n  catOrder.length = 0;\n  saved.catOrder.forEach(c => catOrder.push(c));\n  firstRecordDone = !!saved.firstRecordDone;\n  Object.assign(profile, saved.profile);\n}\n\nlet delMode = false;\n\nfunction renderEntries(v) {\n  document.getElementById(\"d-entries\").innerHTML = v.entries.map((e, i) =>\n    `<div class=\"entry\"><div class=\"e-head\"><span class=\"date\">${e.date}</span><span class=\"kind\">${e.kind}</span>${delMode ? `<span class=\"e-del\" onclick=\"delEntry(${i})\">×</span>` : \"\"}</div>${e.text ? `<p class=\"text\">${e.text}</p>` : \"\"}${e.img ? `<img src=\"${e.img}\">` : \"\"}</div>`\n  ).join(\"\");\n}\n\nfunction delEntry(i) {\n  const v = items[currentKey];\n  const kind = v.entries[i].kind;\n  v.entries.splice(i, 1);\n  if (i === 0 && v.entries.length) {\n    const f = v.entries[0];\n    v.quote = f.text ? \"「\" + f.text.split(/[。？！\\n]/)[0] + \"。」\" : \"\";\n  }\n  if (kind === \"决定购买\" || kind === \"决定不买\") {\n    v.status = \"deciding\";\n    v.state = \"犹豫中\";\n    v.time = \"犹豫中\";\n    v.sub = \"记于 · \" + (v.entries[0] ? v.entries[0].date : \"\");\n  }\n  if (kind === \"闲置\" || kind === \"告别\") {\n    v.status = \"companion\";\n    v.state = \"陪伴你\";\n    v.time = \"陪伴中\";\n  }\n  document.getElementById(\"d-state\").textContent = v.state;\n  renderActions(v);\n  renderEntries(v);\n  renderTimeline(); renderIndex();\n  persist();\n}\n\nfunction toggleDelMode() {\n  const v = items[currentKey];\n  if (delMode && v.entries.length === 0) {\n    delete items[currentKey];\n    renderTimeline(); renderIndex();\n    persist();\n    delMode = false;\n    closeDetail();\n    return;\n  }\n  delMode = !delMode;\n  document.getElementById(\"d-del-hint\").style.display = delMode ? \"block\" : \"none\";\n  renderEntries(v);\n}\nfunction exitDelMode() {\n  delMode = false;\n  document.getElementById(\"d-del-hint\").style.display = \"none\";\n  renderEntries(items[currentKey]);\n}\n\nfunction openSearch() {\n  lastScreen = document.querySelector(\".screen.active\").id.replace(\"screen-\", \"\");\n  if (lastScreen === \"search\" || lastScreen === \"detail\" || lastScreen === \"create\") lastScreen = \"timeline\";\n  showScreen(\"search\");\n  document.getElementById(\"tabbar\").style.display = \"none\";\n  document.getElementById(\"search-input\").value = \"\";\n  document.getElementById(\"search-results\").innerHTML = \"\";\n  document.getElementById(\"search-default\").style.display = \"\";\n  window.scrollTo(0, 0);\n  setTimeout(() => document.getElementById(\"search-input\").focus(), 50);\n}\nfunction closeSearch() {\n  showScreen(lastScreen);\n  document.getElementById(\"tabbar\").style.display = \"\";\n}\nfunction runSearch() {\n  const q = document.getElementById(\"search-input\").value.trim();\n  const box = document.getElementById(\"search-results\");\n  const def = document.getElementById(\"search-default\");\n  if (!q) { box.innerHTML = \"\"; def.style.display = \"\"; return; }\n  def.style.display = \"none\";\n  const hits = Object.keys(items).filter(k => {\n    const v = items[k];\n    return v.name.includes(q) || (v.quote || \"\").includes(q) ||\n      v.entries.some(e => (e.text || \"\").includes(q));\n  });\n  box.innerHTML = hits.length ? hits.map(k => {\n    const v = items[k];\n    return `<div class=\"row\" style=\"margin-top:10px\" onclick=\"openDetail('${k}')\">\n      <div class=\"row-top\"><span class=\"name\">${v.name}</span><span class=\"time\">${v.state}</span></div>\n      <p class=\"sub\">${v.sub}</p>\n    </div>`;\n  }).join(\"\") : `<p class=\"empty-note\">没有找到与「${q}」有关的记录。</p>`;\n}\n\nfunction openDrawer() {\n  document.getElementById(\"scrim\").classList.add(\"show\");\n  document.getElementById(\"drawer\").classList.add(\"show\");\n}\nfunction closeDrawer() {\n  document.getElementById(\"scrim\").classList.remove(\"show\");\n  document.getElementById(\"drawer\").classList.remove(\"show\");\n}\n\nfunction showRitual(text, label, name) {\n  document.getElementById(\"ritual-label\").textContent = label || \"决策日记\";\n  document.getElementById(\"ritual-name\").textContent = name || \"\";\n  document.getElementById(\"ritual-text\").textContent = text;\n  document.getElementById(\"ritual-date\").textContent = \"记于 \" + todayCn;\n  document.getElementById(\"ritual\").classList.add(\"show\");\n}\nfunction hideRitual() {\n  document.getElementById(\"ritual\").classList.remove(\"show\");\n}\n\nfunction renderActions(v) {\n  const el = document.getElementById(\"d-actions\");\n  if (v.status === \"deciding\") {\n    el.innerHTML = `<button class=\"btn\" onclick=\"startCompose('buy')\">带它回家</button>\n      <button class=\"btn ghost\" onclick=\"startCompose('pass')\">想清楚了，不买</button>\n      <button class=\"btn ghost\" onclick=\"startCompose('note')\">追记</button>`;\n  } else if (v.status === \"companion\") {\n    el.innerHTML = `<button class=\"btn\" onclick=\"startCompose('review')\">写回访</button>\n      <button class=\"btn ghost\" onclick=\"startCompose('idle')\">闲置了</button>\n      <button class=\"btn ghost\" onclick=\"startCompose('bye')\">告别</button>`;\n  } else if (v.status === \"idle\") {\n    el.innerHTML = `<button class=\"btn\" onclick=\"startCompose('revive')\">又用起来了</button>\n      <button class=\"btn ghost\" onclick=\"startCompose('bye')\">告别</button>`;\n  } else {\n    el.innerHTML = \"\";\n  }\n  el.style.display = \"flex\";\n}\nfunction startCompose(mode) {\n  composeMode = mode;\n  const ph = {\n    buy: \"为什么决定买？给未来的自己留一句。\",\n    pass: \"为什么不买了？写下来，它值得被记住。\",\n    review: \"它最近怎么样？\",\n    note: \"补充一点现在的想法。\",\n    idle: \"怎么闲置了？对自己说实话。\",\n    revive: \"它回到你的生活里了？\",\n    bye: \"怎么告别的？卖掉、送人，还是用坏了。\"\n  };\n  const t = document.getElementById(\"d-compose-text\");\n  t.value = \"\";\n  t.placeholder = ph[mode];\n  resetPhoto(\"d\");\n  composeCalUsed = false;\n  document.getElementById(\"d-date-line\").textContent = \"记录时间 · 今天\";\n  const calW = document.getElementById(\"c-cal-wrap\");\n  if (document.getElementById(\"d-cal-slot\").contains(calW)) calW.style.display = \"none\";\n  document.getElementById(\"d-compose-hint\").style.display = \"none\";\n  document.getElementById(\"d-photo-label\").textContent = mode === \"review\" ? \"拍一张它现在的样子\" : \"添加一张图（可不填）\";\n  document.getElementById(\"d-compose\").style.display = \"block\";\n  document.getElementById(\"d-actions\").style.display = \"none\";\n  t.focus();\n}\nfunction hideCompose() {\n  document.getElementById(\"d-compose\").style.display = \"none\";\n  document.getElementById(\"d-actions\").style.display = \"flex\";\n}\nfunction saveCompose() {\n  const v = items[currentKey];\n  const text = document.getElementById(\"d-compose-text\").value.trim();\n  const hint = document.getElementById(\"d-compose-hint\");\n  if (!text && !picked.d) {\n    hint.textContent = \"写一句，或加一张照片。\";\n    hint.style.display = \"block\";\n    return;\n  }\n  if (!text && [\"buy\", \"pass\", \"idle\", \"bye\"].includes(composeMode)) {\n    hint.textContent = \"这个决定值得写一句话。\";\n    hint.style.display = \"block\";\n    return;\n  }\n  hint.style.display = \"none\";\n  const entryIso = composeCalUsed && calSelected ? calSelected : null;\n  const entryDate = entryIso ? dateToCn(entryIso) : todayCn;\n  const entryTs = entryIso ? new Date(entryIso + \"T12:00:00\").getTime() : Date.now();\n  const days = (v.state.match(/第 (\\d+) 天/) || [])[1];\n  if (composeMode === \"buy\") {\n    v.entries.push({ ts: entryTs, date: entryDate, kind: \"决定购买\", text, img: picked.d || undefined });\n    v.buyTs = entryTs;\n    v.status = \"companion\"; v.state = \"陪伴你 · 刚开始\"; v.time = \"刚开始\"; v.sub = \"刚开始陪伴你\";\n    showRitual(days ? `犹豫了 ${days} 天，你决定带它回家。` : \"你想清楚了，决定带它回家。\", \"决定购买\", v.name);\n  } else if (composeMode === \"pass\") {\n    v.entries.push({ ts: entryTs, date: entryDate, kind: \"决定不买\", text, img: picked.d || undefined });\n    v.status = \"passed\"; v.state = \"想清楚了，没有买\"; v.time = monthOrder[0]; v.sub = \"想清楚于 · \" + monthOrder[0];\n    showRitual(days ? `这个念头陪了你 ${days} 天，你想清楚了。` : \"你想清楚了，放下了它。\", \"决定不买\", v.name);\n  } else if (composeMode === \"review\") {\n    v.entries.push({ ts: entryTs, date: entryDate, kind: \"回访\", text, img: picked.d || undefined });\n    v.sub = entryIso ? \"上次回访 · \" + entryDate : \"上次回访 · 刚刚\";\n  } else if (composeMode === \"idle\") {\n    v.entries.push({ ts: entryTs, date: entryDate, kind: \"闲置\", text, img: picked.d || undefined });\n    v.status = \"idle\"; v.state = \"闲置了\"; v.time = monthOrder[0]; v.sub = \"闲置于 · \" + monthOrder[0];\n  } else if (composeMode === \"revive\") {\n    v.entries.push({ ts: entryTs, date: entryDate, kind: \"回访\", text, img: picked.d || undefined });\n    v.status = \"companion\"; v.state = \"陪伴你 · 又开始了\"; v.time = \"又开始了\"; v.sub = \"上次回访 · 刚刚\";\n  } else if (composeMode === \"bye\") {\n    v.entries.push({ ts: entryTs, date: entryDate, kind: \"告别\", text, img: picked.d || undefined });\n    v.status = \"ended\"; v.state = \"告别了 · \" + monthOrder[0]; v.time = monthOrder[0]; v.sub = \"告别于 · \" + monthOrder[0];\n    showRitual(\"它陪伴过你的日子，都记在这里了。\", \"告别\", v.name);\n  } else {\n    v.entries.push({ ts: entryTs, date: entryDate, kind: \"追记\", text, img: picked.d || undefined });\n  }\n  renderTimeline(); renderIndex();\n  persist();\n  openDetail(currentKey);\n}\n\n/* ── Calendar ── */\nlet calYear = now.getFullYear(), calMonth = now.getMonth(), calSelected = null;\n\nfunction renderCal() {\n  const title = document.getElementById(\"cal-title\");\n  title.textContent = calYear + \" 年 \" + cn[calMonth] + \"月\";\n  const grid = document.getElementById(\"cal-grid\");\n  const first = new Date(calYear, calMonth, 1).getDay();\n  const days = new Date(calYear, calMonth + 1, 0).getDate();\n  let html = \"\";\n  for (let i = 0; i < first; i++) html += `<span class=\"cal-cell empty\"></span>`;\n  for (let d = 1; d <= days; d++) {\n    const iso = calYear + \"-\" + String(calMonth + 1).padStart(2, \"0\") + \"-\" + String(d).padStart(2, \"0\");\n    const isToday = d === now.getDate() && calMonth === now.getMonth() && calYear === now.getFullYear();\n    const isSel = calSelected === iso;\n    const cls = [\"cal-cell\"];\n    if (isToday) cls.push(\"today\");\n    if (isSel) cls.push(\"selected\");\n    html += `<span class=\"${cls.join(\" \")}\" onclick=\"calPick('${iso}')\">${d}</span>`;\n  }\n  grid.innerHTML = html;\n  document.getElementById(\"cal-y\").value = calYear;\n  document.getElementById(\"cal-m\").value = calMonth + 1;\n  document.getElementById(\"cal-d\").value = calSelected ? parseInt(calSelected.split(\"-\")[2]) : \"\";\n}\n\nfunction calPick(iso) {\n  calSelected = iso;\n  const parts = iso.split(\"-\");\n  calYear = parseInt(parts[0]);\n  calMonth = parseInt(parts[1]) - 1;\n  renderCal();\n  syncComposeDateLabel();\n}\nfunction syncComposeDateLabel() {\n  if (calSelected && document.getElementById(\"d-cal-slot\").contains(document.getElementById(\"c-cal-wrap\"))) {\n    document.getElementById(\"d-date-line\").textContent = \"记录时间 · \" + dateToCn(calSelected);\n  }\n}\n\nfunction calNav(dir) {\n  calMonth += dir;\n  if (calMonth < 0) { calMonth = 11; calYear--; }\n  if (calMonth > 11) { calMonth = 0; calYear++; }\n  renderCal();\n}\n\nfunction calManualGo() {\n  const y = parseInt(document.getElementById(\"cal-y\").value);\n  const m = parseInt(document.getElementById(\"cal-m\").value);\n  const d = parseInt(document.getElementById(\"cal-d\").value);\n  if (y && m >= 1 && m <= 12) {\n    calYear = y;\n    calMonth = m - 1;\n    if (d >= 1 && d <= new Date(y, m, 0).getDate()) {\n      calSelected = y + \"-\" + String(m).padStart(2, \"0\") + \"-\" + String(d).padStart(2, \"0\");\n    }\n    renderCal();\n    syncComposeDateLabel();\n  }\n}\n\nlet composeCalUsed = false;\nfunction toggleComposeCal() {\n  const cal = document.getElementById(\"c-cal-wrap\");\n  const slot = document.getElementById(\"d-cal-slot\");\n  if (!slot.contains(cal) || cal.style.display === \"none\") {\n    slot.appendChild(cal);\n    cal.style.display = \"\";\n    composeCalUsed = true;\n    calReset();\n    syncComposeDateLabel();\n  } else {\n    cal.style.display = \"none\";\n  }\n}\n\nfunction calReset() {\n  calYear = now.getFullYear();\n  calMonth = now.getMonth();\n  const td = now.getFullYear() + \"-\" + String(now.getMonth() + 1).padStart(2, \"0\") + \"-\" + String(now.getDate()).padStart(2, \"0\");\n  calSelected = td;\n  renderCal();\n}\n\nrestore();\napplyProfile();\nrenderTimeline();\nrenderIndex();\n\n/* PWA：注册 service worker，让它可安装到主屏、离线可用。\n   file:// 直接打开时没有 SW 环境，静默跳过，不影响本地预览。 */\nif (\"serviceWorker\" in navigator && location.protocol.startsWith(\"http\")) {\n  window.addEventListener(\"load\", () => {\n    navigator.serviceWorker.register(\"sw.js\").catch(() => {});\n  });\n}\n<\/script>\n</body>\n</html>\n";
  const defaults = { filtersY: 40.5, listY: 30.5 };
  const storageKey = "decision-srcdoc-index-adjuster-v1";
  const fields = ["filtersY", "listY"];
  let values = { ...defaults };
  try { values = { ...values, ...JSON.parse(localStorage.getItem(storageKey) || "{}") }; } catch (e) {}
  const timelineFrame = document.getElementById("timeline-frame");
  const indexFrame = document.getElementById("index-frame");

  function injectedScript(page) {
    return '<script>' + `
(() => {
  const page = ${JSON.stringify(page)};
  let lastValues = { filtersY: 40.5, listY: 30.5 };
  function px(n) { return Number(n).toFixed(1).replace(".0", "") + "px"; }
  function selectPage() {
    document.querySelectorAll(".screen").forEach(screen => {
      screen.classList.toggle("active", screen.id === "screen-" + page);
    });
    document.querySelectorAll(".tab").forEach(tab => {
      tab.classList.toggle("on", tab.dataset.t === page);
    });
    window.scrollTo(0, 0);
  }
  function apply(values) {
    lastValues = { ...lastValues, ...(values || {}) };
    selectPage();
    if (page !== "index") return;
    const filters = document.querySelector("#screen-index .filters");
    const list = document.getElementById("index-list");
    if (filters) filters.style.top = px(lastValues.filtersY);
    if (list) list.style.top = px(lastValues.listY);
  }
  window.addEventListener("message", event => {
    const data = event.data || {};
    if (data.type === "decision-preview-values") apply(data.values);
  });
  selectPage();
  setTimeout(() => apply(lastValues), 80);
  setTimeout(() => apply(lastValues), 260);
  setTimeout(() => apply(lastValues), 700);
})();
` + '<\/script>';
  }

  function buildPreviewDoc(page) {
    const base = '<base href="' + new URL('prototype/', window.location.href).href + '">';
    return prototypeHtml.replace(/<head>/i, '<head>' + base).replace(/<\/body>/i, injectedScript(page) + '</body>');
  }

  timelineFrame.srcdoc = buildPreviewDoc("timeline");
  indexFrame.srcdoc = buildPreviewDoc("index");
  function px(n) { return Number(n).toFixed(1).replace(".0", "") + "px"; }
  function renderOutput() {
    document.getElementById("output").textContent =
`页面：索引页

全部 到 告别：上下相对位置
上下 ${px(values.filtersY)}

数码及以下白框：上下相对位置
上下 ${px(values.listY)}`;
  }
  function sendPreview() { indexFrame.contentWindow?.postMessage({ type: "decision-preview-values", values }, "*"); }
  function sync() {
    fields.forEach(key => {
      document.getElementById(key).value = values[key];
      document.getElementById(key + "Out").textContent = px(values[key]);
    });
    localStorage.setItem(storageKey, JSON.stringify(values));
    renderOutput();
    sendPreview();
  }
  fields.forEach(key => {
    document.getElementById(key).addEventListener("input", event => {
      values[key] = Number(event.target.value);
      sync();
    });
  });
  indexFrame.addEventListener("load", () => {
    setTimeout(sendPreview, 80);
    setTimeout(sendPreview, 260);
    setTimeout(sendPreview, 700);
  });
  document.getElementById("resetBtn").addEventListener("click", () => { values = { ...defaults }; sync(); });
  document.getElementById("copyBtn").addEventListener("click", async () => {
    const text = document.getElementById("output").textContent;
    try { await navigator.clipboard.writeText(text); }
    catch (e) {
      const area = document.createElement("textarea");
      area.value = text;
      document.body.appendChild(area);
      area.select();
      document.execCommand("copy");
      area.remove();
    }
  });
  sync();
</script>

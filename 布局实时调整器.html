<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>决策日记 · 时间线布局调整器</title>
<style>
  :root {
    --paper: #F6F1F0;
    --card: #FFFFFF;
    --ink: #1D1A1A;
    --ink-soft: #5E5757;
    --gray: #8E8688;
    --gray-faint: #BBB2B3;
    --line: #EBE3E1;
    --accent: #5E5CE6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #FBFAF8;
    color: var(--ink);
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  }
  .layout {
    display: grid;
    grid-template-columns: 390px minmax(330px, 390px);
    gap: 24px;
    width: min(840px, calc(100vw - 32px));
    margin: 0 auto;
    padding: 26px 0;
    align-items: start;
  }
  .module-title {
    font-size: 13px;
    color: var(--gray);
    margin: 0 0 10px 2px;
    font-weight: 600;
  }
  .phone {
    width: 390px;
    min-height: 844px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 34px;
    overflow: hidden;
    box-shadow: 0 16px 40px rgba(44, 36, 32, 0.10);
  }
  .screen {
    min-height: 844px;
    padding: 24px 24px 92px;
    position: relative;
  }
  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .rel { position: relative; }
  .page-title {
    position: relative;
    left: 0;
    top: 37.5px;
    font-size: 29px;
    font-weight: 700;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .icons {
    position: relative;
    left: 0;
    top: 38px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .round-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #E6E4E6;
    color: #1C1B1D;
    display: grid;
    place-items: center;
    flex: 0 0 auto;
  }
  .round-btn svg { width: 14px; height: 14px; }
  .avatar-text { font-size: 10px; font-weight: 500; }
  .stats {
    position: relative;
    left: 0;
    top: 48.5px;
    color: var(--gray);
    white-space: nowrap;
    font-size: 12.5px;
  }
  .stats b { font-weight: 600; }
  .stats .a { color: var(--accent); }
  .stats .k { color: var(--ink); }
  .timeline-stack {
    position: relative;
    top: 66px;
  }
  .review {
    width: 342px;
    min-height: 51px;
    background: var(--card);
    border-radius: 18px;
    padding: 14px 16px;
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.65;
    overflow: hidden;
  }
  .month { font-size: 15px; font-weight: 600; margin: 20px 0 10px; }
  .card {
    background: var(--card);
    border-radius: 18px;
    padding: 15px 16px 13px;
    margin-bottom: 10px;
  }
  .card-name { font-size: 15.5px; font-weight: 600; }
  .quote { font-size: 13px; color: var(--gray); line-height: 1.6; margin-top: 9px; }
  .state { font-size: 11.5px; color: var(--gray-faint); margin-top: 10px; }
  .panel {
    background: #fff;
    border: 1px solid #EEE8E4;
    border-radius: 12px;
    padding: 18px;
    position: sticky;
    top: 18px;
    max-height: calc(100vh - 36px);
    overflow: auto;
  }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .hint { font-size: 12.5px; color: var(--gray); line-height: 1.7; margin-bottom: 16px; }
  .group { border-top: 1px solid #F0EAE6; padding-top: 14px; margin-top: 14px; }
  .group:first-of-type { border-top: 0; padding-top: 0; }
  .group-title { font-size: 13px; font-weight: 700; margin-bottom: 9px; }
  .ctl { display: grid; grid-template-columns: 64px 1fr 54px; gap: 9px; align-items: center; margin: 8px 0; }
  .ctl label { color: var(--gray); font-size: 12px; }
  .ctl input { accent-color: var(--accent); width: 100%; }
  .val { font-size: 11.5px; color: var(--ink-soft); text-align: right; font-variant-numeric: tabular-nums; }
  .actions { display: flex; gap: 8px; margin-top: 16px; }
  button {
    border: 1px solid #D9D2D0;
    background: #fff;
    border-radius: 8px;
    padding: 9px 13px;
    font-size: 13px;
    cursor: pointer;
  }
  button.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  pre {
    margin-top: 14px;
    padding: 12px;
    border-radius: 8px;
    background: #F6F1F0;
    color: var(--ink-soft);
    font: 11.5px/1.75 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    white-space: pre-wrap;
  }
  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; width: min(420px, calc(100vw - 24px)); }
    .phone { width: min(390px, 100%); }
    .panel { position: static; max-height: none; }
  }
</style>
</head>
<body>
<div class="layout">
  <main>
    <p class="module-title">时间线页预览</p>
    <div class="phone">
      <section class="screen">
        <div class="top-row">
          <p class="page-title">决策日记</p>
          <div class="icons">
            <div class="round-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="7"/><line x1="15.8" y1="15.8" x2="21" y2="21"/></svg>
            </div>
            <div class="round-btn"><span class="avatar-text">我</span></div>
          </div>
        </div>
        <p class="stats" id="home-stats"><b class="a">2</b> 在想　<b class="k">6</b> 陪伴中　陪伴你 <b class="k">18</b> 天</p>
        <div class="timeline-stack" id="timeline-stack">
          <div class="review" id="review-card">降噪耳机已经陪你三个月了，感觉如何？</div>
          <p class="month">七月</p>
          <div class="card"><p class="card-name">Sony A7C II 相机</p><p class="quote">想要一台能随身带出门的相机，但不确定会不会吃灰。</p><p class="state">犹豫中 · 第 23 天</p></div>
          <div class="card"><p class="card-name">Kindle 阅读器</p><p class="quote">手机上读不进书，也许换个设备能好一点？</p><p class="state">犹豫中 · 第 6 天</p></div>
        </div>
      </section>
    </div>
  </main>

  <aside class="panel">
    <h1>时间线布局调整器</h1>
    <p class="hint">顶部标题和搜索/我按钮使用当前写死位置。这里专门调整统计行与“降噪耳机”白色框。</p>
    <div id="controls"></div>
    <div class="actions">
      <button onclick="resetValues()">重置</button>
      <button class="primary" onclick="copyValues()">复制数值</button>
    </div>
    <pre id="out"></pre>
  </aside>
</div>

<script>
const CONFIG = [
  { title: "2 在想 到 陪伴你 18 天：大小与上下相对位置", keys: [
    ["statsY", "上下", -30, 140, 46], ["statsSize", "字号", 10, 22, 12.5]
  ] },
  { title: "降噪耳机白色框：大小与上下相对位置", keys: [
    ["reviewY", "上下", -40, 180, 57.5], ["reviewW", "宽度", 220, 342, 342], ["reviewH", "高度", 42, 110, 51]
  ] }
];
const STORAGE_KEY = "decision-layout-timeline-v2";
const defaults = {};
CONFIG.forEach(group => group.keys.forEach(k => defaults[k[0]] = k[4]));
let values = { ...defaults, ...(JSON.parse(localStorage.getItem(STORAGE_KEY) || "null") || {}) };

function px(v) { return v + "px"; }

function draw() {
  const stats = document.getElementById("home-stats");
  stats.style.top = px(values.statsY);
  stats.style.fontSize = px(values.statsSize);

  const stack = document.getElementById("timeline-stack");
  stack.style.top = px(values.reviewY);
  const review = document.getElementById("review-card");
  review.style.width = px(values.reviewW);
  review.style.minHeight = px(values.reviewH);

  localStorage.setItem(STORAGE_KEY, JSON.stringify(values));
  renderOutput();
}

function renderControls() {
  document.getElementById("controls").innerHTML = CONFIG.map(group =>
    '<div class="group"><p class="group-title">' + group.title + '</p>' +
    group.keys.map(k =>
      '<div class="ctl"><label>' + k[1] + '</label><input type="range" id="' + k[0] + '" min="' + k[2] + '" max="' + k[3] + '" step="0.5" value="' + values[k[0]] + '"><span class="val" id="' + k[0] + '-val">' + values[k[0]] + 'px</span></div>'
    ).join("") + '</div>'
  ).join("");
  CONFIG.flatMap(group => group.keys).forEach(k => {
    const el = document.getElementById(k[0]);
    el.addEventListener("input", () => {
      values[k[0]] = parseFloat(el.value);
      document.getElementById(k[0] + "-val").textContent = values[k[0]] + "px";
      draw();
    });
  });
}

function renderOutput() {
  document.getElementById("out").textContent =
    "页面：时间线页\n\n" +
    "2 在想 到 陪伴你 18 天：大小与上下相对位置\n" +
    "上下 " + values.statsY + "px   字号 " + values.statsSize + "px\n\n" +
    "降噪耳机白色框：大小与上下相对位置\n" +
    "上下 " + values.reviewY + "px   宽度 " + values.reviewW + "px   高度 " + values.reviewH + "px";
}

function resetValues() {
  values = { ...defaults };
  renderControls();
  draw();
}

function copyValues() {
  navigator.clipboard.writeText(document.getElementById("out").textContent).then(
    () => alert("已复制当前数值。"),
    () => alert("复制失败，可以手动选中下方数值复制。")
  );
}

renderControls();
draw();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>决策日记 · 时间线布局调整器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #FBFAF8;
    color: #1D1A1A;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  }
  .layout {
    display: grid;
    grid-template-columns: 420px minmax(330px, 390px);
    gap: 28px;
    width: min(880px, calc(100vw - 32px));
    margin: 0 auto;
    padding: 26px 0;
    align-items: start;
  }
  .module-title {
    font-size: 13px;
    color: #8E8688;
    margin: 0 0 10px 2px;
    font-weight: 600;
  }
  .real-preview {
    width: 420px;
    height: 844px;
    border: 1px solid #EBE3E1;
    border-radius: 18px;
    overflow: hidden;
    background: #F6F1F0;
  }
  iframe {
    width: 420px;
    height: 844px;
    border: 0;
    display: block;
    background: #F6F1F0;
  }
  .panel {
    background: #fff;
    border: 1px solid #EEE8E4;
    border-radius: 12px;
    padding: 18px;
    position: sticky;
    top: 18px;
    max-height: calc(100vh - 36px);
    overflow: auto;
  }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .hint { font-size: 12.5px; color: #8E8688; line-height: 1.7; margin-bottom: 16px; }
  .group { border-top: 1px solid #F0EAE6; padding-top: 14px; margin-top: 14px; }
  .group:first-of-type { border-top: 0; padding-top: 0; }
  .group-title { font-size: 13px; font-weight: 700; margin-bottom: 9px; }
  .ctl { display: grid; grid-template-columns: 64px 1fr 54px; gap: 9px; align-items: center; margin: 8px 0; }
  .ctl label { color: #8E8688; font-size: 12px; }
  .ctl input { accent-color: #5E5CE6; width: 100%; }
  .val { font-size: 11.5px; color: #5E5757; text-align: right; font-variant-numeric: tabular-nums; }
  .actions { display: flex; gap: 8px; margin-top: 16px; }
  button {
    border: 1px solid #D9D2D0;
    background: #fff;
    border-radius: 8px;
    padding: 9px 13px;
    font-size: 13px;
    cursor: pointer;
  }
  button.primary { background: #1D1A1A; color: #fff; border-color: #1D1A1A; }
  pre {
    margin-top: 14px;
    padding: 12px;
    border-radius: 8px;
    background: #F6F1F0;
    color: #5E5757;
    font: 11.5px/1.75 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    white-space: pre-wrap;
  }
  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; width: min(420px, calc(100vw - 24px)); }
    .panel { position: static; max-height: none; }
    .real-preview, iframe { width: min(420px, 100%); }
  }
</style>
</head>
<body>
<div class="layout">
  <main>
    <p class="module-title">真实 prototype 时间线页</p>
    <div class="real-preview">
      <iframe id="preview" src="prototype/index.html"></iframe>
    </div>
  </main>

  <aside class="panel">
    <h1>时间线布局调整器</h1>
    <p class="hint">左边直接加载真实的 prototype 页面，不再手工仿制。滑块会把样式注入到这份真实页面里，所以比例和手机/浏览器里一致。</p>
    <div id="controls"></div>
    <div class="actions">
      <button onclick="resetValues()">重置</button>
      <button class="primary" onclick="copyValues()">复制数值</button>
    </div>
    <pre id="out"></pre>
  </aside>
</div>

<script>
const CONFIG = [
  { title: "2 在想 到 陪伴你 18 天：上下左右相对位置与大小", keys: [
    ["statsX", "左右", -80, 80, 0], ["statsY", "上下", -30, 140, 44.5], ["statsSize", "字号", 10, 22, 12.5]
  ] },
  { title: "降噪耳机白色框：大小与上下相对位置", keys: [
    ["reviewY", "上下", -40, 180, 44], ["reviewW", "宽度", 220, 372, 372], ["reviewH", "高度", 42, 110, 68.5]
  ] },
  { title: "剩下所有白框：上下调整", keys: [
    ["listY", "上下", -40, 180, 35]
  ] }
];
const STORAGE_KEY = "decision-layout-timeline-real-v5";
const defaults = {};
CONFIG.forEach(group => group.keys.forEach(k => defaults[k[0]] = k[4]));
let values = { ...defaults, ...(JSON.parse(localStorage.getItem(STORAGE_KEY) || "null") || {}) };
let frameReady = false;

function px(v) { return v + "px"; }

function ensureStyle(doc) {
  let style = doc.getElementById("timeline-adjuster-style");
  if (!style) {
    style = doc.createElement("style");
    style.id = "timeline-adjuster-style";
    doc.head.appendChild(style);
  }
  return style;
}

function draw() {
  const frame = document.getElementById("preview");
  const css = `
    #screen-timeline .header {
      position: relative !important;
      left: ${px(values.statsX)} !important;
      top: ${px(values.statsY)} !important;
    }
    #screen-timeline .page-sub {
      font-size: ${px(values.statsSize)} !important;
    }
    #screen-timeline .review-line {
      position: relative !important;
      top: ${px(values.reviewY)} !important;
      width: ${px(values.reviewW)} !important;
      min-height: ${px(values.reviewH)} !important;
    }
    #screen-timeline #timeline-list {
      position: relative !important;
      top: ${px(values.listY)} !important;
    }
  `;

  try {
    const doc = frame.contentDocument;
    if (doc && doc.head) {
      const style = ensureStyle(doc);
      style.textContent = css;
      if (doc.getElementById("screen-timeline")) {
        doc.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
        doc.getElementById("screen-timeline").classList.add("active");
        const tabbar = doc.getElementById("tabbar");
        if (tabbar) tabbar.style.display = "";
      }
    }
  } catch (e) {}

  if (frame.contentWindow) {
    frame.contentWindow.postMessage({
      type: "timeline-layout-adjust",
      css,
      values
    }, "*");
  }

  localStorage.setItem(STORAGE_KEY, JSON.stringify(values));
  renderOutput();
}

function renderControls() {
  document.getElementById("controls").innerHTML = CONFIG.map(group =>
    '<div class="group"><p class="group-title">' + group.title + '</p>' +
    group.keys.map(k =>
      '<div class="ctl"><label>' + k[1] + '</label><input type="range" id="' + k[0] + '" min="' + k[2] + '" max="' + k[3] + '" step="0.5" value="' + values[k[0]] + '"><span class="val" id="' + k[0] + '-val">' + values[k[0]] + 'px</span></div>'
    ).join("") + '</div>'
  ).join("");
  CONFIG.flatMap(group => group.keys).forEach(k => {
    const el = document.getElementById(k[0]);
    el.addEventListener("input", () => {
      values[k[0]] = parseFloat(el.value);
      document.getElementById(k[0] + "-val").textContent = values[k[0]] + "px";
      draw();
    });
  });
}

function renderOutput() {
  document.getElementById("out").textContent =
    "页面：时间线页\n\n" +
    "2 在想 到 陪伴你 18 天：上下左右相对位置与大小\n" +
    "左右 " + values.statsX + "px   上下 " + values.statsY + "px   字号 " + values.statsSize + "px\n\n" +
    "降噪耳机白色框：大小与上下相对位置\n" +
    "上下 " + values.reviewY + "px   宽度 " + values.reviewW + "px   高度 " + values.reviewH + "px\n\n" +
    "剩下所有白框：上下调整\n" +
    "上下 " + values.listY + "px";
}

function resetValues() {
  values = { ...defaults };
  renderControls();
  draw();
}

function copyValues() {
  navigator.clipboard.writeText(document.getElementById("out").textContent).then(
    () => alert("已复制当前数值。"),
    () => alert("复制失败，可以手动选中下方数值复制。")
  );
}

document.getElementById("preview").addEventListener("load", () => {
  frameReady = true;
  draw();
});

renderControls();
renderOutput();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>决策日记 · 索引布局调整器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #FBFAF8;
    color: #1D1A1A;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  }
  .layout {
    display: grid;
    grid-template-columns: 420px 420px minmax(330px, 380px);
    gap: 22px;
    width: min(1264px, calc(100vw - 32px));
    margin: 0 auto;
    padding: 26px 0;
    align-items: start;
  }
  .module-title {
    font-size: 13px;
    color: #8E8688;
    margin: 0 0 10px 2px;
    font-weight: 600;
  }
  .preview-frame {
    width: 420px;
    height: 844px;
    border: 1px solid #EBE3E1;
    border-radius: 18px;
    overflow: hidden;
    background: #F6F1F0;
  }
  iframe {
    width: 420px;
    height: 844px;
    border: 0;
    display: block;
    background: #F6F1F0;
  }
  .panel {
    background: #fff;
    border: 1px solid #EEE8E4;
    border-radius: 12px;
    padding: 18px;
    position: sticky;
    top: 18px;
    max-height: calc(100vh - 36px);
    overflow: auto;
  }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .hint { font-size: 12.5px; color: #8E8688; line-height: 1.7; margin-bottom: 16px; }
  .group { border-top: 1px solid #F0EAE6; padding-top: 14px; margin-top: 14px; }
  .group:first-of-type { border-top: 0; padding-top: 0; }
  .group-title { font-size: 13px; font-weight: 700; margin-bottom: 9px; }
  .ctl { display: grid; grid-template-columns: 64px 1fr 54px; gap: 9px; align-items: center; margin: 8px 0; }
  .ctl label { color: #8E8688; font-size: 12px; }
  .ctl input { accent-color: #5E5CE6; width: 100%; }
  .val { font-size: 11.5px; color: #5E5757; text-align: right; font-variant-numeric: tabular-nums; }
  .actions { display: flex; gap: 8px; margin-top: 16px; }
  button {
    border: 1px solid #D9D2D0;
    background: #fff;
    border-radius: 8px;
    padding: 9px 13px;
    font-size: 13px;
    cursor: pointer;
  }
  button.primary { background: #1D1A1A; color: #fff; border-color: #1D1A1A; }
  pre {
    margin-top: 14px;
    padding: 12px;
    border-radius: 8px;
    background: #F6F1F0;
    color: #5E5757;
    font: 11.5px/1.75 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    white-space: pre-wrap;
  }
  @media (max-width: 1080px) {
    .layout { grid-template-columns: 1fr; width: min(420px, calc(100vw - 24px)); }
    .panel { position: static; max-height: none; }
    .preview-frame, iframe { width: min(420px, 100%); }
  }
</style>
</head>
<body>
<div class="layout">
  <main>
    <p class="module-title">写死的时间线页</p>
    <div class="preview-frame">
      <iframe id="timeline-frame" src="prototype/index.html"></iframe>
    </div>
  </main>

  <main>
    <p class="module-title">索引页预览</p>
    <div class="preview-frame">
      <iframe id="index-frame" src="prototype/index.html"></iframe>
    </div>
  </main>

  <aside class="panel">
    <h1>索引布局调整器</h1>
    <p class="hint">两个预览都直接加载真实 prototype。左边固定显示时间线页作参照，右边显示索引页；滑块只影响右边索引预览，不会保存进 prototype。</p>
    <div id="controls"></div>
    <div class="actions">
      <button onclick="resetValues()">重置</button>
      <button class="primary" onclick="copyValues()">复制数值</button>
    </div>
    <pre id="out"></pre>
  </aside>
</div>

<script>
const CONFIG = [
  { title: "你认真想过 10 件东西：上下左右相对位置与大小", keys: [
    ["indexSubX", "左右", -80, 80, 0], ["indexSubY", "上下", -30, 140, 44.5], ["indexSubSize", "字号", 10, 22, 12.5]
  ] },
  { title: "全部 到 告别：上下与等比例大小调整", keys: [
    ["indexFiltersY", "上下", -30, 160, 40.5], ["indexFiltersScale", "比例", 0.7, 1.3, 1, "x"]
  ] },
  { title: "数码与白框：上下调整", keys: [
    ["indexWhiteY", "上下", -40, 190, 30.5]
  ] }
];
const STORAGE_KEY = "decision-layout-index-real-preview-v3";
const defaults = {};
CONFIG.forEach(group => group.keys.forEach(k => defaults[k[0]] = k[4]));
let values = { ...defaults, ...(JSON.parse(localStorage.getItem(STORAGE_KEY) || "null") || {}) };

function px(v) { return v + "px"; }

function buildIndexCss() {
  return `
    #screen-index .header {
      position: relative !important;
      left: ${px(values.indexSubX)} !important;
      top: ${px(values.indexSubY)} !important;
    }
    #screen-index .page-sub {
      font-size: ${px(values.indexSubSize)} !important;
    }
    #screen-index .filters {
      position: relative !important;
      top: ${px(values.indexFiltersY)} !important;
      transform: scale(${values.indexFiltersScale}) !important;
      transform-origin: left top !important;
    }
    #screen-index #index-list {
      position: relative !important;
      top: ${px(values.indexWhiteY)} !important;
    }
  `;
}

function postToFrame(id, screen, css) {
  const frame = document.getElementById(id);
  if (!frame.contentWindow) return;
  frame.contentWindow.postMessage({
    type: "decision-layout-preview",
    screen,
    css: css || ""
  }, "*");
}

function draw() {
  postToFrame("timeline-frame", "timeline", "");
  postToFrame("index-frame", "index", buildIndexCss());
  localStorage.setItem(STORAGE_KEY, JSON.stringify(values));
  renderOutput();
}

function renderControls() {
  document.getElementById("controls").innerHTML = CONFIG.map(group =>
    '<div class="group"><p class="group-title">' + group.title + '</p>' +
    group.keys.map(k =>
      '<div class="ctl"><label>' + k[1] + '</label><input type="range" id="' + k[0] + '" min="' + k[2] + '" max="' + k[3] + '" step="' + (k[5] === "x" ? "0.01" : "0.5") + '" value="' + values[k[0]] + '"><span class="val" id="' + k[0] + '-val">' + formatVal(k, values[k[0]]) + '</span></div>'
    ).join("") + '</div>'
  ).join("");
  CONFIG.flatMap(group => group.keys).forEach(k => {
    const el = document.getElementById(k[0]);
    el.addEventListener("input", () => {
      values[k[0]] = parseFloat(el.value);
      document.getElementById(k[0] + "-val").textContent = formatVal(k, values[k[0]]);
      draw();
    });
  });
}

function formatVal(k, v) {
  return k[5] === "x" ? Number(v).toFixed(2) + "x" : v + "px";
}

function renderOutput() {
  document.getElementById("out").textContent =
    "页面：索引页\n\n" +
    "你认真想过 10 件东西：上下左右相对位置与大小\n" +
    "左右 " + values.indexSubX + "px   上下 " + values.indexSubY + "px   字号 " + values.indexSubSize + "px\n\n" +
    "全部 到 告别：上下与等比例大小调整\n" +
    "上下 " + values.indexFiltersY + "px   比例 " + Number(values.indexFiltersScale).toFixed(2) + "x\n\n" +
    "数码与白框：上下调整\n" +
    "上下 " + values.indexWhiteY + "px";
}

function resetValues() {
  values = { ...defaults };
  renderControls();
  draw();
}

function copyValues() {
  navigator.clipboard.writeText(document.getElementById("out").textContent).then(
    () => alert("已复制当前数值。"),
    () => alert("复制失败，可以手动选中下方数值复制。")
  );
}

document.getElementById("timeline-frame").addEventListener("load", draw);
document.getElementById("index-frame").addEventListener("load", draw);
renderControls();
renderOutput();
</script>
</body>
</html>
